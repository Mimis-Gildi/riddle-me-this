github                      : [metadata]

# Site Metadata
title                       : "Vadim Kuhay"
subtitle                    : "Creative Engineering at Scale"
title_separator             : " - "
description                 : "Creative engineering work and resume of Vadim Kuhay."
email                       : "rIdd13r@pm.me"
url                         : "https://mimis-gildi.github.io"
baseurl                     : "/riddle-me-this"
github_username             : "Mimis-Gildi"
twitter_username            : ""

# Theme and Styling
remote_theme                : "mmistakes/minimal-mistakes"
#minimal_mistakes_skin: "default" # "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise"
minimal_mistakes_skin       : "air"


# Plugins
plugins:
  - jekyll-asciidoc
  - jekyll-data
  - jekyll-feed
  - jekyll-remote-theme
  - jekyll-paginate-v2
  - jekyll-include-cache
  - jekyll-archives
  - jekyll-sitemap



# Pagination defaults
pagination:
  enabled                   : true
  per_page                  : 10
  permalink                 : '/page/:num/'
  title                     : ':title - page :num'



# Defaults for posts (when you start adding them) and pages
defaults:
  - scope:
      path                  : ""
      type                  : posts
    values:
      layout                : single
      author_profile        : true
      read_time             : true
      comments              : false
      share                 : true
      related               : true
      breadcrumbs           : false
  - scope:
      path                  : ""
      type                  : pages
    values:
      layout                : single
      author_profile        : false
      header:
        overlay_image       : /assets/images/banner-default.png



# Reading Files
include:
  - _pages
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - README.md
keep_files:
  - .temp
encoding                    : "utf-8"



# Site root Author
author:
  name                      : "Vadim Kuhay"
  avatar                    : "/assets/images/dadar-medallion.jpg"
  bio                       : "A humble system designer, team builder, and player-coach"
  location                  : "On the Scene"
  email                     : "rIdd13r@pm.me"
  links:
    - label                 : "GitHub Home"
      icon                  : "fab fa-fw fa-github"
      url                   : "https://github.com/rdd13r"
    - label                 : "LinkedIn"
      icon                  : "fab fa-fw fa-linkedin"
      url                   : "https://www.linkedin.com/in/rdd13r"
    - label                 : "Company Website"
      icon                  : "fas fa-fw fa-link"
      url                   : "https://asei.systems"
    - label                 : "Medium Publishing"
      icon                  : "fab fa-fw fa-medium"
      url                   : "https://medium.com/@rdd13r"
      description           : "My Medium publishing page. Some of my writings are here."
    - label                 : "Mastodon Placeholder"
      icon                  : "fab fa-fw fa-mastodon"
      url                   : "https://me.dm/@rdd13r"



# Site Settings
locale                      : "en-US"
rtl                         : false
name                        : "Vadim Kuhay - adventures and reflections"
repository                  : "Mimis-Gildi/riddle-me-this"
teaser                      : "/assets/images/banner.png"
logo                        : "/assets/images/button_300_300.jpg"
masthead_title              : "adventures in ..." # use " " for no title
breadcrumbs                 : true
words_per_minute            : 300
enable_copy_code_button     : true
compress_html               : true

copyright                   : "© Vadim Kuhay; 2022–2026; v14.0.24"
copyright_url               : "https://mimis-gildi.github.io/riddle-me-this"

### Serve
port                        : 4700
livereload                  : true
livereload_port             : 37729
open_url                    : true
incremental                 : true
verbose                     : true

sass:
  quiet_deps                : true
  silence_deprecations:
    - import
safe                        : false


### AsciiDoc / Asciidoctor — site-wide attributes
asciidoctor:
  attributes:
    icons                   : font
    cb-hacker               : 'http://www.catb.org/jargon/html/H/hacker.html[hacker,window=_blank]'
    cb-mundane              : 'http://www.catb.org/jargon/html/M/mundane.html[mundane,window=_blank]'
    chatgpt                 : 'https://chat.openai.com/[ChatGPT,window=_blank]'
    hera-school             : 'https://gervi-hera-vitr.github.io/sindri-labs/[Héra Academy Laboratory,window=_blank,opts=nofollow]'
    hera-school-url         : 'https://gervi-hera-vitr.github.io/sindri-labs/'
    mailto-rIdd13r          : 'mailto:rIdd13r@pm.me?subject=Hello%20Riddler%20-%20Let%20us%20compete%3F[rIdd13r@pm.me]'
    openai                  : 'https://www.openai.com/[OpenAI website,window=_blank]'
    openai-blog             : 'https://www.openai.com/blog/[OpenAI Blog,window=_blank]'
    profile-li              : 'https://www.linkedin.com/in/rdd13r[LinkedIn Profile,window=_blank]'
    li-newsletter           : 'https://www.linkedin.com/newsletters/behind-the-scenes-at-ase-7074840676026208257[Behind the Scenes at ASE,window=_blank,opts=nofollow]'
    rdd13r-gh               : 'https://github.com/rdd13r[rdd13r,window=_blank]'
    release                 : 'https://github.com/Mimis-Gildi/riddle-me-this/releases/tag/v13.1.0[v13.1.0,window=_blank]'
    resume                  : 'https://github.com/Mimis-Gildi/riddle-me-this/releases/download/v13.1.0/VadimKuhay-Resume.pdf'
    total-recall            : 'https://mimis-gildi.github.io/mcp-total-recall/[MCP Total Recall,window=_blank]'
    org-mimis-gildi         : 'https://github.com/Mimis-Gildi[Mímis Gildi,window=_blank]'


# My general footer...
footer:
  links:
    - label: "GitHub Root Org"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Mimis-Gildi"
    - label: "Discussions"
      icon: "fas fa-fw fa-comments"
      url: "https://github.com/Mimis-Gildi/riddle-me-this/discussions"
    - label: "ASE Inc."
      icon: "fas fa-fw fa-building"
      url: "https://asei.systems"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/rdd13r"
    - label: "Fingerprint"
      icon: "fas fa-fw fa-fingerprint"
      url: "/riddle-me-this/assets/images/button_300_300.jpg"



# I'm using GitHub for my comments
comments:
  provider                  : utterances
  utterances:
    theme                   : # "github-light" (default), "github-dark"
    issue_term              : # "pathname" (default)
    repo                    : "Mimis-Gildi/riddle-me-this"   # your public GitHub repo
    label                   : "💬 comments"



# Archives: Enable taxonomy pages for tags, categories, and year
category_archive:
  type: jekyll-archives
  path: /categories/

tag_archive:
  type: jekyll-archives
  path: /tags/

jekyll-archives:
  enabled:
    - year
    - month
    - day
    - categories
    - tags
  layouts:
    year: archive-year
    month: archive-month
    day: archive-day
    category: archive-taxonomy
    tag: archive-taxonomy
  permalinks:
    year: /archive/:year/
    month: /archive/:year/:month/
    day: /archive/:year/:month/:day/
    category: /categories/:name/
    tag: /tags/:name/



# Using feeds, and at least I check
atom_feed:
  hide                      : false



# All my Search Ideas
search                      : true
search_full_content         : true
search_provider             : lunr
lunr:
  search_within_pages       : true



# Social Sharing
og_image                    : /assets/images/banner.jpg
social:
  type                      : Person
  name                      : Vadim Kuhay
  links:
    - https://github.com/rdd13r
    - https://www.linkedin.com/in/rdd13r
