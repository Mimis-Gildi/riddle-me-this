name: Qodana
run-name: "Qodana scan on ${{ github.repository }} by ${{ github.actor }} with ${{ github.event_name }} (Attempt ${{ github.run_attempt }})"

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  schedule:
    - cron: '11 11 * * *'

permissions:
  contents: read
  pull-requests: write
  checks: write

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}-quality"
  cancel-in-progress: true

defaults:
  run:
    shell: zsh -l {0}

jobs:
  qodana-scan:
    runs-on: [self-hosted, qodana]
    timeout-minutes: 17

    steps:

      - name: Checkout full repository
        uses: actions/checkout@v6.0.2
        timeout-minutes: 3
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Run Qodana Scan
        uses: JetBrains/qodana-action@v2025.3.2
        timeout-minutes: 75
        with:
          pr-mode: ${{ github.event_name == 'pull_request' }}
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_1786443399 }}
          QODANA_ENDPOINT: 'https://qodana.cloud'
