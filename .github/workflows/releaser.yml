name: Publish Release
run-name: "Published on ${{ github.repository }} by ${{ github.actor }} with ${{ github.event_name }} (Attempt ${{ github.run_attempt }})"

on:
  pull_request:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:

jobs:
  release:
    uses: Mimis-Gildi/fluffle/.github/workflows/releaser.yml@main
    with:
      build-tasks: 'build asciidoctorPdf'
      artifacts: 'build/docs/asciidocPdf/*.pdf'
    secrets: inherit
    permissions:
      contents: write
