name: Publish Release
run-name: "Published on ${{ github.repository }} by ${{ github.actor }} with ${{ github.event_name }} (Attempt ${{ github.run_attempt }})"

on:
  pull_request:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:
    inputs:
      resume:
        required: false
        type: boolean
        default: false
        description: 'Build and attach resume PDF'

jobs:
  release:
    uses: Mimis-Gildi/fluffle/.github/workflows/releaser.yml@main
    with:
      build-tasks: ${{ (inputs.resume || contains(github.event.pull_request.labels.*.name, 'resume')) && 'build asciidoctorPdf' || 'build' }}
      artifacts: ${{ (inputs.resume || contains(github.event.pull_request.labels.*.name, 'resume')) && 'build/docs/asciidocPdf/VadimKuhay-Resume.pdf' || '' }}
      release-title: ${{ (inputs.resume || contains(github.event.pull_request.labels.*.name, 'resume')) && 'Resume Release' || 'Article Release' }}
    secrets: inherit
    permissions:
      contents: write

  update-resume-version:
    needs: release
    if: ${{ inputs.resume || contains(github.event.pull_request.labels.*.name, 'resume') }}
    runs-on: self-hosted
    timeout-minutes: 3
    permissions:
      contents: write
    steps:

      - name: Checkout main
        uses: actions/checkout@v6.0.2
        with:
          ref: main

      - name: Update resumeVersion
        run: |
          VERSION=$(grep '^version=' gradle.properties | cut -d= -f2)
          sed -i "s/^resumeVersion=.*/resumeVersion=v${VERSION}/" gradle.properties
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          git diff --cached --quiet || git commit -m "Update resumeVersion to v${VERSION} [skip up]"
          git pull --rebase
          git push
