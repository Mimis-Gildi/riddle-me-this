name: Increment Version
run-name: "Incremented Version on ${{ github.repository }} by ${{ github.actor }} with ${{ github.event_name }} (Attempt ${{ github.run_attempt }})"

on:
  push:
    branches-ignore:
      - main
      - release
      - 'releases/**'
      - 'renovate/**'
      - 'dependabot/**'
  create:
    branches:
      - '[0-9]+-**'
  pull_request:
    types:
      - synchronize
      - opened
      - reopened
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

defaults:
  run:
    shell: zsh -l {0}

concurrency:
  group: incrementer-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  increment:
    if: ${{ !(github.event_name == 'push' && github.event.created) }}
    uses: Mimis-Gildi/fluffle/.github/workflows/incrementer.yml@main
    secrets: inherit


  update-resume-links:
    needs: increment
    if: ${{ needs.increment.outputs.new != '' }}
    runs-on: self-hosted
    timeout-minutes: 3
    steps:

      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0
          persist-credentials: 'true'

      - name: Check for resume label
        id: label-check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          (( $+GITHUB_TOKEN )) && printf 'GITHUB_TOKEN is set!\n' || printf 'GITHUB_TOKEN is NOT set!\n'
          (( $+GH_TOKEN )) && printf 'GH_TOKEN is set!\n' || printf 'GH_TOKEN is NOT set!\n'

          HAS_LABEL=$(gh pr list --json labels --jq '.[0].labels[].name' 2>/dev/null | grep -c '^resume$')
          if (( HAS_LABEL == 1 )); then
            printf '::notice::This is a resume update PR.\n'
            echo "update=true" >> $GITHUB_OUTPUT
          else
            printf '::notice::NOT a resume update PR.\n'
          fi

      - name: Update resume version references
        if: ${{ steps.label-check.outputs.update == 'true' }}
        uses: ./.github/actions/update-version-references
        with:
          superseded-version: v${{ needs.increment.outputs.old }}
          current-version: v${{ needs.increment.outputs.new }}
          published-version: v${{ needs.increment.outputs.old }}
          link-replacements: |
            [
              {"path": "site/index.adoc", "pattern": "releases/download/{version}/VadimKuhay-Resume.pdf", "count": 1},
              {"path": "site/_pages/maintainer.adoc", "pattern": "releases/tag/{version}", "count": 1},
              {"path": "site/_pages/maintainer.adoc", "pattern": "releases/download/{version}/VadimKuhay-Resume.pdf", "count": 1},
              {"path": "README.adoc", "pattern": "releases/download/{version}/VadimKuhay-Resume.pdf", "count": 1}
            ]

      - name: Commit and push
        if: ${{ steps.label-check.outputs.update == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          (( $+GITHUB_TOKEN )) && printf 'GITHUB_TOKEN is set!\n' || printf 'GITHUB_TOKEN is NOT set!\n'
          (( $+GH_TOKEN )) && printf 'GH_TOKEN is set!\n' || printf 'GH_TOKEN is NOT set!\n'

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch && git pull
          git add -A
          git commit -m "Update resume version references to v${{ needs.increment.outputs.new }} [skip up]"
          git push origin
