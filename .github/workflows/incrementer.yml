name: Increment Version
run-name: "Incremented Version on ${{ github.repository }} by ${{ github.actor }} with ${{ github.event_name }} (Attempt ${{ github.run_attempt }})"

on:
  push:
    branches-ignore:
      - main
      - release
      - 'releases/**'
      - 'renovate/**'
      - 'dependabot/**'
  create:
    branches:
      - '[0-9]+-**'
  pull_request:
    types:
      - opened
      - reopened
  workflow_dispatch:

jobs:
  increment:
    if: ${{ !(github.event_name == 'push' && github.event.created) }}
    uses: Mimis-Gildi/fluffle/.github/workflows/incrementer.yml@main
    secrets: inherit
    permissions:
      contents: write


  update-resume-links:
    needs: increment
    if: ${{ needs.increment.outputs.new != '' }}
    runs-on: self-hosted
    timeout-minutes: 3
    permissions:
      contents: write
    steps:

      - name: Checkout PR head
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Check for resume label
        id: label-check
        run: |
          BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          HAS_LABEL=$(GH_TOKEN="$GITHUB_TOKEN" gh pr list --head "$BRANCH" --json labels --jq '.[0].labels[].name' 2>/dev/null | grep -c '^resume$' || true)
          if (( HAS_LABEL == 0 )); then
            echo "::notice::No 'resume' label on PR for branch $BRANCH — skipping link update"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Update resume version references
        if: ${{ steps.label-check.outputs.skip != 'true' }}
        uses: ./.github/actions/update-version-references
        with:
          superseded-version: v${{ needs.increment.outputs.old }}
          current-version: v${{ needs.increment.outputs.new }}
          published-version: v${{ needs.increment.outputs.old }}
          link-replacements: |
            [
              {"path": "site/index.adoc", "pattern": "releases/download/{version}/VadimKuhay-Resume.pdf", "count": 1},
              {"path": "site/_pages/maintainer.adoc", "pattern": "releases/tag/{version}", "count": 1},
              {"path": "site/_pages/maintainer.adoc", "pattern": "releases/download/{version}/VadimKuhay-Resume.pdf", "count": 1},
              {"path": "README.adoc", "pattern": "releases/download/{version}/VadimKuhay-Resume.pdf", "count": 1}
            ]

      - name: Commit and push
        if: ${{ steps.label-check.outputs.skip != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add -A
          git diff --cached --quiet || git commit -m "Update resume version references to v${{ needs.increment.outputs.new }} [skip up]"
          git push origin HEAD:${{ github.head_ref }}
