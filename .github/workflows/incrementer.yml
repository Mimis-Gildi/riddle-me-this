name: Increment Version
run-name: "Incremented Version on ${{ github.repository }} by ${{ github.actor }} with ${{ github.event_name }} (Attempt ${{ github.run_attempt }})"

on:
  push:
    branches-ignore:
      - release
      - 'releases/**'
      - 'renovate/**'
      - 'dependabot/**'
  create:
  pull_request:
    branches-ignore:
      - 'renovate/**'
      - 'dependabot/**'
    types:
      - synchronize
      - opened
      - reopened
  workflow_dispatch:
    inputs:
      increment:
        required: false
        type: choice
        options:
          - skip
          - patch
          - minor
          - major
          - fail
        default: patch
        description: 'Force increment type. Default is patch.'
  workflow_call:
    inputs:
      increment:
        required: false
        type: string
        default: patch
        description: 'Force increment type (skip/patch/minor/major/fail). Default is patch.'
    outputs:
      type:
        value: ${{ jobs.mimis-increment.outputs.type }}
      old:
        value: ${{ jobs.mimis-increment.outputs.old }}
      new:
        value: ${{ jobs.mimis-increment.outputs.new }}
      sha:
        value: ${{ jobs.mimis-increment.outputs.sha }}




permissions:
  contents: write
  pull-requests: write

defaults:
  run:
    shell: zsh -l {0}

concurrency:
  group: incrementer-${{ github.head_ref || github.ref }}
  cancel-in-progress: false

jobs:

  mimis-increment:
    uses: Mimis-Gildi/fluffle/.github/workflows/incrementer.yml@main
    with:
      force-action: ${{ inputs.increment }}
    secrets: inherit

  update-internal-links:
    needs: mimis-increment
    if: ${{ needs.mimis-increment.outputs.new != '' }}
    runs-on: self-hosted
    timeout-minutes: 4
    outputs:
      update: ${{ steps.label-check.outputs.update }}
    steps:

      - name: Checkout
        uses: actions/checkout@v5.0.1
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Check for resume label
        id: label-check
        timeout-minutes: 1
        env:
          GH_TOKEN: ${{ secrets.CI_PAT }}
        run: |
          (( $+GITHUB_TOKEN )) && printf 'GITHUB_TOKEN is set!\n' || printf 'GITHUB_TOKEN is NOT set!\n'
          (( $+GH_TOKEN )) && printf 'GH_TOKEN is set!\n' || printf 'GH_TOKEN is NOT set!\n'

          LABELS=$(gh pr view --json labels --jq '.labels[].name' 2>/dev/null)
          printf '::trace title=Label Check::Labels found: %s\n' "$LABELS"
          HAS_LABEL=$(echo "$LABELS" | grep -c '^resume$')
          if (( HAS_LABEL == 1 )); then
            printf '::notice::This is a resume update PR.\n'
            echo "update=true" >> $GITHUB_OUTPUT
          else
            printf '::notice::NOT a resume update PR.\n'
          fi

      - name: Update link version references
        id: replace-links
        timeout-minutes: 1
        uses: ./.github/actions/update-version-references
        env:
          RESUME_REPLACEMENTS: |
            [
              {"path": "site/index.adoc", "pattern": "releases/download/{version}/VadimKuhay-Resume.pdf", "count": 1},
              {"path": "site/_pages/maintainer.adoc", "pattern": "releases/tag/{version}", "count": 1},
              {"path": "site/_pages/maintainer.adoc", "pattern": "releases/download/{version}/VadimKuhay-Resume.pdf", "count": 1},
              {"path": "README.adoc", "pattern": "releases/download/{version}/VadimKuhay-Resume.pdf", "count": 1}
            ]
        with:
          superseded-version: v${{ needs.mimis-increment.outputs.old }}
          current-version: v${{ needs.mimis-increment.outputs.new }}
          published-version: v${{ needs.mimis-increment.outputs.old }}
          link-replacements: ${{ steps.label-check.outputs.update == 'true' && env.RESUME_REPLACEMENTS || '[]' }}

      - name: Commit and push
        id: commit-push
        timeout-minutes: 2
        env:
          GH_TOKEN: ${{ secrets.CI_PAT }}
        run: |
          (( $+GITHUB_TOKEN )) && printf 'GITHUB_TOKEN is set!\n' || printf 'GITHUB_TOKEN is NOT set!\n'
          (( $+GH_TOKEN )) && printf 'GH_TOKEN is set!\n' || printf 'GH_TOKEN is NOT set!\n'

          git config user.name "R!dd13r"
          git config user.email "12781006+rdd13r@users.noreply.github.com"
          
          # This is a very specific local work-around for some agents that run on alternative git implementation.
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          git fetch && git pull
          git add -A
          git diff --cached --quiet || git commit -m "Update version references to v${{ needs.mimis-increment.outputs.new }} [skip up]"
          git push origin

  report-edits:
    needs: [mimis-increment, update-internal-links]
    runs-on: self-hosted
    steps:
      - name: Report Actions
        run: |
          print "Mimis Increment: ${{ needs.mimis-increment.outputs.new }}"
          print "Update Internal Links: ${{ needs.update-internal-links.outputs.update }}"
