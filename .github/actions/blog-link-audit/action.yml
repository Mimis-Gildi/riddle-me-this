name: Blog Link Audit
description: >
  Scans AsciiDoc posts for body-link violations, shadowed globals,
  cross-article duplicates, and promotion candidates.
  Requires full repository checkout before invocation (reads site/).
author: rdd13r
branding:
  icon: search
  color: blue

runs:
  using: composite
  steps:

    - id: manual-activate
      shell: zsh -l {0}
      run: ${{ github.action_path }}/conda-activate.sh

    - id: check-links
      shell: zsh -l {0}
      run: ${{ github.action_path }}/check-link-attributes.py